<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ApexFlow | Stadium Intelligence</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap" async defer></script>
</head>

<body>
    <header>
        <h1>APEXFLOW AI</h1>
        <div id="connection-status" class="badge">● System Online</div>
    </header>

    <div id="map"></div>

    <section id="assistant-ui">
        <div class="telemetry-row">
            <div class="gate-status">North Gate: <span id="north-load" class="load-text">HIGH</span></div>
            <div class="gate-status">West Gate: <span id="west-load" class="load-text">LOW</span></div>
        </div>

        <div class="status-card">
            <p id="ai-output" aria-live="polite">Ready to assist. Tap below for optimal exit routing.</p>
            <div class="button-group">
                <button class="action-btn" onclick="triggerSmartLogic()">Find Fastest Path</button>
                <button class="emergency-btn" onclick="triggerEmergency()">Safety Protocol</button>
            </div>
        </div>
    </section>

    <script src="app.js"></script>
</body>

</html>
