<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VenueFlow AI</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>VenueFlow <span style="font-weight:300">OS</span></h1>
    </header>

    <div id="map"></div>

    <section id="assistant-ui">
        <div class="telemetry">
            <div class="stat-box">
                <div class="stat-label">North Gate</div>
                <div id="north-load" class="stat-value">32%</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">West Gate</div>
                <div id="west-load" class="stat-value">12%</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Avg Wait</div>
                <div id="wait-time" class="stat-value">6m</div>
            </div>
        </div>

        <p id="ai-output">System ready. Real-time telemetry synced from venue IoT mesh.</p>

        <div class="btn-row">
            <button class="main-btn" onclick="triggerSmartLogic()">Route Optimizer</button>
            <button class="sos-btn" onclick="triggerEmergency()">SOS</button>
        </div>
    </section>

    <script src="app.js"></script>
</body>

</html>
